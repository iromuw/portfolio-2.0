<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Mori Wu — MW Favicon (filled, 32×32)
    Transparent background
    Two teal diamonds overlapping, inner region = darker teal

    Geometry:
    Left diamond  center (11,16), half=11: T(11,5)  R(22,16) B(11,27) L(0,16)
    Right diamond center (21,16), half=11: T(21,5)  R(32,16) B(21,27) L(10,16)

    Intersection → cross_top(16,10) cross_bot(16,22)
    Inner diamond: T(16,10) R(22,16) B(16,22) L(10,16)
  -->

  <!-- Left diamond -->
  <polygon points="0,16  11,5  22,16  11,27" fill="#4ecca3"/>

  <!-- Right diamond -->
  <polygon points="10,16  21,5  32,16  21,27" fill="#4ecca3"/>

  <!-- Inner overlap diamond — darker teal for depth -->
  <polygon points="16,10  22,16  16,22  10,16" fill="#2a9d8a"/>
</svg>